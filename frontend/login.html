<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitForge - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: { 50: '#f0f9ff', 100: '#e0f2fe', 200: '#bae6fd', 300: '#7dd3fc', 400: '#38bdf8', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1', 800: '#075985', 900: '#0c4a6e' },
            accent: { 50: '#fdf4ff', 100: '#fae8ff', 200: '#f5d0fe', 300: '#f0abfc', 400: '#e879f9', 500: '#d946ef', 600: '#c026d3', 700: '#a21caf', 800: '#86198f', 900: '#701a75' }
          }
        }
      }
    }
  </script>
  <style>
    @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
    @keyframes scale-in { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    @keyframes slide-up { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fade-in 0.5s ease-out; }
    .animate-scale-in { animation: scale-in 0.3s ease-out; }
    .animate-slide-up { animation: slide-up 0.4s ease-out; }
  </style>
</head>
<body class="min-h-screen bg-slate-50 dark:bg-slate-950 transition-colors duration-300">
  <div class="min-h-screen flex flex-col">
    <header class="bg-white dark:bg-slate-900 shadow-sm border-b border-slate-200 dark:border-slate-800">
      <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
        <div class="flex items-center gap-2">
          <svg class="w-8 h-8 text-primary-600 dark:text-primary-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
          </svg>
          <span class="text-xl font-bold text-slate-900 dark:text-white">FitForge</span>
        </div>
        <button id="darkModeToggle" type="button" class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors focus:ring-2 focus:ring-primary-500" aria-label="Toggle dark mode">
          <svg id="sunIcon" class="w-6 h-6 text-slate-600 dark:text-slate-400 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
          <svg id="moonIcon" class="w-6 h-6 text-slate-600 dark:text-slate-400 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
        </button>
      </div>
    </header>

    <main class="flex-1 flex items-center justify-center p-4">
      <div class="w-full max-w-md animate-scale-in">
        <div class="bg-white dark:bg-slate-900 rounded-2xl shadow-xl overflow-hidden">
          <div class="flex border-b border-slate-200 dark:border-slate-800">
            <button id="loginTab" type="button" class="flex-1 py-4 text-center font-medium text-primary-600 dark:text-primary-400 border-b-2 border-primary-600 dark:border-primary-400 transition-colors">Login</button>
            <button id="signupTab" type="button" class="flex-1 py-4 text-center font-medium text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-300 border-b-2 border-transparent transition-colors">Sign Up</button>
          </div>

          <form id="loginForm" class="p-6 space-y-5">
            <div>
              <label for="loginEmail" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Email</label>
              <input type="email" id="loginEmail" name="email" required class="w-full px-4 py-3 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all" placeholder="you@example.com">
            </div>
            <div>
              <label for="loginPassword" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Password</label>
              <div class="relative">
                <input type="password" id="loginPassword" name="password" required class="w-full px-4 py-3 pr-12 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all" placeholder="••••••••">
                <button type="button" id="toggleLoginPassword" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-700 dark:hover:text-slate-300">
                  <svg class="w-5 h-5 eye-open" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                </button>
              </div>
            </div>
            <div class="flex items-center">
              <input type="checkbox" id="rememberMe" class="w-4 h-4 rounded border-slate-300 text-primary-600 focus:ring-primary-500">
              <label for="rememberMe" class="ml-2 text-sm text-slate-600 dark:text-slate-400">Remember me</label>
            </div>
            <div id="loginError" class="hidden rounded-lg bg-red-50 dark:bg-red-900/20 p-3 text-sm text-red-600 dark:text-red-400"></div>
            <button type="submit" id="loginBtn" class="w-full py-3 px-4 bg-primary-600 hover:bg-primary-700 text-white font-medium rounded-lg shadow-md hover:shadow-lg transition-all active:scale-95 flex items-center justify-center gap-2">
              <span>Sign In</span>
              <svg id="loginSpinner" class="hidden w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
            </button>
          </form>

          <form id="signupForm" class="p-6 space-y-5 hidden">
            <div>
              <label for="signupName" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Name</label>
              <input type="text" id="signupName" name="name" required class="w-full px-4 py-3 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all" placeholder="Your name">
            </div>
            <div>
              <label for="signupEmail" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Email</label>
              <input type="email" id="signupEmail" name="email" required class="w-full px-4 py-3 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all" placeholder="you@example.com">
            </div>
            <div>
              <label for="signupPassword" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Password</label>
              <div class="relative">
                <input type="password" id="signupPassword" name="password" required minlength="6" class="w-full px-4 py-3 pr-12 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all" placeholder="••••••••">
                <button type="button" id="toggleSignupPassword" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-700 dark:hover:text-slate-300">
                  <svg class="w-5 h-5 eye-open" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                </button>
              </div>
              <p class="mt-1 text-xs text-slate-500 dark:text-slate-500">Minimum 6 characters</p>
            </div>
            <div id="signupError" class="hidden rounded-lg bg-red-50 dark:bg-red-900/20 p-3 text-sm text-red-600 dark:text-red-400"></div>
            <button type="submit" id="signupBtn" class="w-full py-3 px-4 bg-primary-600 hover:bg-primary-700 text-white font-medium rounded-lg shadow-md hover:shadow-lg transition-all active:scale-95 flex items-center justify-center gap-2">
              <span>Create Account</span>
              <svg id="signupSpinner" class="hidden w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
            </button>
          </form>
        </div>
      </div>
    </main>
    <div id="toastContainer" class="fixed top-4 right-4 z-50 space-y-2"></div>
  </div>

  <script>
    const initDarkMode = () => {
      const isDark = localStorage.getItem('darkMode') === 'true' || (!localStorage.getItem('darkMode') && window.matchMedia('(prefers-color-scheme: dark)').matches);
      document.documentElement.classList.toggle('dark', isDark);
    };
    const toggleDark = () => {
      document.documentElement.classList.toggle('dark');
      localStorage.setItem('darkMode', document.documentElement.classList.contains('dark'));
    };
    initDarkMode();
    document.getElementById('darkModeToggle').addEventListener('click', toggleDark);

    const loginTab = document.getElementById('loginTab'), signupTab = document.getElementById('signupTab');
    const loginForm = document.getElementById('loginForm'), signupForm = document.getElementById('signupForm');
    const showLogin = () => {
      loginTab.classList.add('text-primary-600', 'dark:text-primary-400', 'border-primary-600', 'dark:border-primary-400');
      loginTab.classList.remove('text-slate-500', 'dark:text-slate-400', 'border-transparent');
      signupTab.classList.remove('text-primary-600', 'dark:text-primary-400', 'border-primary-600', 'dark:border-primary-400');
      signupTab.classList.add('text-slate-500', 'dark:text-slate-400', 'border-transparent');
      loginForm.classList.remove('hidden'); signupForm.classList.add('hidden');
    };
    const showSignup = () => {
      signupTab.classList.add('text-primary-600', 'dark:text-primary-400', 'border-primary-600', 'dark:border-primary-400');
      signupTab.classList.remove('text-slate-500', 'dark:text-slate-400', 'border-transparent');
      loginTab.classList.remove('text-primary-600', 'dark:text-primary-400', 'border-primary-600', 'dark:border-primary-400');
      loginTab.classList.add('text-slate-500', 'dark:text-slate-400', 'border-transparent');
      signupForm.classList.remove('hidden'); loginForm.classList.add('hidden');
    };
    loginTab.addEventListener('click', showLogin); signupTab.addEventListener('click', showSignup);

    const setupPasswordToggle = (inputId, btnId) => {
      const input = document.getElementById(inputId), btn = document.getElementById(btnId);
      btn.addEventListener('click', () => {
        input.type = input.type === 'password' ? 'text' : 'password';
        btn.innerHTML = input.type === 'text' 
          ? '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/></svg>'
          : '<svg class="w-5 h-5 eye-open" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>';
      });
    };
    setupPasswordToggle('loginPassword', 'toggleLoginPassword');
    setupPasswordToggle('signupPassword', 'toggleSignupPassword');

    const showToast = (msg, type = 'success') => {
      const container = document.getElementById('toastContainer'), toast = document.createElement('div');
      const colors = type === 'success' ? 'bg-green-50 dark:bg-green-900/20 text-green-600 dark:text-green-400 border-green-200 dark:border-green-800' : 
                     'bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400 border-red-200 dark:border-red-800';
      toast.className = `animate-slide-up px-4 py-3 rounded-lg border shadow-lg ${colors} flex items-center gap-2 min-w-[300px]`;
      toast.innerHTML = `<span class="flex-1">${msg}</span><button class="hover:opacity-70" onclick="this.parentElement.remove()"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>`;
      container.appendChild(toast);
      setTimeout(() => { toast.style.opacity = '0'; toast.style.transform = 'translateX(100%)'; toast.style.transition = 'all 0.3s'; setTimeout(() => toast.remove(), 300); }, 3000);
    };

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value, password = document.getElementById('loginPassword').value, remember = document.getElementById('rememberMe').checked;
      const errorDiv = document.getElementById('loginError'), btn = document.getElementById('loginBtn'), spinner = document.getElementById('loginSpinner');
      errorDiv.classList.add('hidden'); btn.disabled = true; spinner.classList.remove('hidden');
      try {
        const res = await fetch('/api/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password }) });
        const data = await res.json();
        if (!res.ok || !data.success) throw new Error(data.error || 'Login failed');
        localStorage.setItem('token', data.data.token); localStorage.setItem('user', JSON.stringify(data.data.user));
        if (remember) localStorage.setItem('rememberEmail', email); else localStorage.removeItem('rememberEmail');
        showToast('Welcome back! Redirecting...', 'success');
        setTimeout(() => window.location.href = '/', 500);
      } catch (err) {
        errorDiv.textContent = err.message; errorDiv.classList.remove('hidden'); showToast(err.message, 'error');
      } finally { btn.disabled = false; spinner.classList.add('hidden'); }
    });

    signupForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('signupName').value, email = document.getElementById('signupEmail').value, password = document.getElementById('signupPassword').value;
      const errorDiv = document.getElementById('signupError'), btn = document.getElementById('signupBtn'), spinner = document.getElementById('signupSpinner');
      errorDiv.classList.add('hidden'); btn.disabled = true; spinner.classList.remove('hidden');
      try {
        const res = await fetch('/api/auth/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password, name }) });
        const data = await res.json();
        if (!res.ok || !data.success) throw new Error(data.error || 'Registration failed');
        localStorage.setItem('token', data.data.token); localStorage.setItem('user', JSON.stringify(data.data.user));
        showToast('Account created! Welcome to FitForge!', 'success');
        setTimeout(() => window.location.href = '/', 500);
      } catch (err) {
        errorDiv.textContent = err.message; errorDiv.classList.remove('hidden'); showToast(err.message, 'error');
      } finally { btn.disabled = false; spinner.classList.add('hidden'); }
    });

    if (localStorage.getItem('token')) window.location.href = '/';
    const rememberedEmail = localStorage.getItem('rememberEmail');
    if (rememberedEmail) { document.getElementById('loginEmail').value = rememberedEmail; document.getElementById('rememberMe').checked = true; }
  </script>
</body>
</html>
