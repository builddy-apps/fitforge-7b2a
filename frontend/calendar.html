<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitForge - Calendar</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="app.js"></script>
  <script src="auth-client.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: { 50: '#f0f9ff', 100: '#e0f2fe', 200: '#bae6fd', 300: '#7dd3fc', 400: '#38bdf8', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1', 800: '#075985', 900: '#0c4a6e' },
            accent: { 50: '#fdf4ff', 100: '#fae8ff', 200: '#f5d0fe', 300: '#f0abfc', 400: '#e879f9', 500: '#d946ef', 600: '#c026d3', 700: '#a21caf', 800: '#86198f', 900: '#701a75' }
          }
        }
      }
    }
  </script>
  <style>
    @keyframes fade-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes scale-in { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    @keyframes slide-up { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fade-in 0.5s ease-out forwards; }
    .animate-scale-in { animation: scale-in 0.3s ease-out forwards; }
    .animate-slide-up { animation: slide-up 0.4s ease-out forwards; }
  </style>
</head>
<body class="min-h-screen bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-white transition-colors duration-300 pb-20 lg:pb-0">
  <header class="sticky top-0 z-40 border-b border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md">
    <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <svg class="w-8 h-8 text-primary-600 dark:text-primary-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
        </svg>
        <span class="text-xl font-bold tracking-tight">FitForge</span>
      </div>
      
      <nav class="hidden sm:flex items-center gap-1">
        <a href="index.html" class="px-3 py-2 text-sm font-medium text-slate-600 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors">Home</a>
        <a href="exercises.html" class="px-3 py-2 text-sm font-medium text-slate-600 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors">Exercises</a>
        <a href="routines.html" class="px-3 py-2 text-sm font-medium text-slate-600 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors">Build</a>
        <a href="calendar.html" class="px-3 py-2 text-sm font-medium text-primary-600 dark:text-primary-400 bg-primary-50 dark:bg-primary-950 rounded-lg transition-colors">Calendar</a>
        <a href="records.html" class="px-3 py-2 text-sm font-medium text-slate-600 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors">Profile</a>
      </nav>

      <div class="flex items-center gap-2">
        <button id="darkModeToggle" type="button" class="p-2 rounded-lg text-slate-500 hover:text-slate-900 dark:hover:text-white hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors focus:ring-2 focus:ring-primary-500">
          <svg id="sunIcon" class="w-5 h-5 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
          <svg id="moonIcon" class="w-5 h-5 dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
        </button>
        <button id="logoutBtn" class="hidden sm:block px-3 py-2 text-sm font-medium text-slate-500 hover:text-red-600 dark:hover:text-red-400 transition-colors">Sign Out</button>
      </div>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 py-6">
    <!-- Stats Row -->
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6 animate-fade-in">
      <div class="bg-white dark:bg-slate-900 rounded-xl p-4 shadow-sm border border-slate-200 dark:border-slate-800">
        <div class="flex items-center gap-3">
          <div class="p-2 bg-orange-100 dark:bg-orange-900/30 rounded-lg">
            <svg class="w-6 h-6 text-orange-600 dark:text-orange-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 18.657A8 8 0 016.343 7.343S7 9 9 10c0-2 .5-5 2.986-7C14 5 16.09 5.777 17.656 7.343A7.975 7.975 0 0120 13a7.975 7.975 0 01-2.343 5.657z"/></svg>
          </div>
          <div>
            <p class="text-sm text-slate-500 dark:text-slate-400">Current Streak</p>
            <p id="streakValue" class="text-2xl font-bold text-slate-900 dark:text-white">-</p>
          </div>
        </div>
      </div>
      <div class="bg-white dark:bg-slate-900 rounded-xl p-4 shadow-sm border border-slate-200 dark:border-slate-800">
        <div class="flex items-center gap-3">
          <div class="p-2 bg-primary-100 dark:bg-primary-900/30 rounded-lg">
            <svg class="w-6 h-6 text-primary-600 dark:text-primary-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
          </div>
          <div>
            <p class="text-sm text-slate-500 dark:text-slate-400">This Month</p>
            <p id="monthlyCount" class="text-2xl font-bold text-slate-900 dark:text-white">-</p>
          </div>
        </div>
      </div>
      <div class="bg-white dark:bg-slate-900 rounded-xl p-4 shadow-sm border border-slate-200 dark:border-slate-800">
        <div class="flex items-center gap-3">
          <div class="p-2 bg-green-100 dark:bg-green-900/30 rounded-lg">
            <svg class="w-6 h-6 text-green-600 dark:text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          </div>
          <div>
            <p class="text-sm text-slate-500 dark:text-slate-400">Total Workouts</p>
            <p id="totalWorkouts" class="text-2xl font-bold text-slate-900 dark:text-white">-</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Calendar -->
    <div class="bg-white dark:bg-slate-900 rounded-xl shadow-sm border border-slate-200 dark:border-slate-800 overflow-hidden animate-fade-in stagger-1">
      <!-- Month Navigation -->
      <div class="flex items-center justify-between px-6 py-4 border-b border-slate-200 dark:border-slate-800">
        <button id="prevMonth" type="button" class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors focus:ring-2 focus:ring-primary-500" aria-label="Previous month">
          <svg class="w-5 h-5 text-slate-600 dark:text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        </button>
        <h2 id="currentMonth" class="text-lg font-semibold"></h2>
        <button id="nextMonth" type="button" class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors focus:ring-2 focus:ring-primary-500" aria-label="Next month">
          <svg class="w-5 h-5 text-slate-600 dark:text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
        </button>
      </div>

      <!-- Loading State -->
      <div id="loadingState" class="p-12 text-center">
        <div class="inline-block w-10 h-10 border-4 border-primary-200 border-t-primary-600 rounded-full animate-spin mb-4"></div>
        <p class="text-slate-500 dark:text-slate-400">Loading calendar...</p>
      </div>

      <!-- Calendar Grid -->
      <div id="calendarContainer" class="hidden">
        <!-- Day Headers -->
        <div class="grid grid-cols-7 border-b border-slate-200 dark:border-slate-800">
          <div class="py-3 text-center text-sm font-medium text-slate-500 dark:text-slate-400">Sun</div>
          <div class="py-3 text-center text-sm font-medium text-slate-500 dark:text-slate-400">Mon</div>
          <div class="py-3 text-center text-sm font-medium text-slate-500 dark:text-slate-400">Tue</div>
          <div class="py-3 text-center text-sm font-medium text-slate-500 dark:text-slate-400">Wed</div>
          <div class="py-3 text-center text-sm font-medium text-slate-500 dark:text-slate-400">Thu</div>
          <div class="py-3 text-center text-sm font-medium text-slate-500 dark:text-slate-400">Fri</div>
          <div class="py-3 text-center text-sm font-medium text-slate-500 dark:text-slate-400">Sat</div>
        </div>
        <!-- Days Grid -->
        <div id="calendarGrid" class="grid grid-cols-7"></div>
      </div>
    </div>

    <!-- Legend -->
    <div class="mt-4 flex items-center justify-center gap-6 text-sm text-slate-500 dark:text-slate-400 animate-fade-in stagger-2">
      <div class="flex items-center gap-2">
        <div class="w-4 h-4 rounded bg-primary-200 dark:bg-primary-800"></div>
        <span>1-2 sets</span>
      </div>
      <div class="flex items-center gap-2">
        <div class="w-4 h-4 rounded bg-primary-400 dark:bg-primary-600"></div>
        <span>3-5 sets</span>
      </div>
      <div class="flex items-center gap-2">
        <div class="w-4 h-4 rounded bg-primary-600 dark:bg-primary-400"></div>
        <span>6+ sets</span>
      </div>
    </div>
  </main>

  <!-- Workout Detail Modal -->
  <div id="workoutModal" class="fixed inset-0 z-50 hidden">
    <div class="absolute inset-0 bg-black/50 backdrop-blur-sm" id="modalBackdrop"></div>
    <div class="absolute inset-4 sm:inset-auto sm:top-1/2 sm:left-1/2 sm:-translate-x-1/2 sm:-translate-y-1/2 sm:w-full sm:max-w-lg bg-white dark:bg-slate-900 rounded-2xl shadow-2xl overflow-hidden animate-scale-in">
      <div class="flex items-center justify-between px-6 py-4 border-b border-slate-200 dark:border-slate-800">
        <h3 id="modalDate" class="text-lg font-semibold"></h3>
        <button id="closeModal" type="button" class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors focus:ring-2 focus:ring-primary-500">
          <svg class="w-5 h-5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div id="modalContent" class="p-6 max-h-96 overflow-y-auto"></div>
    </div>
  </div>

  <!-- Mobile Bottom Nav -->
  <nav class="sm:hidden fixed bottom-0 left-0 right-0 bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 z-30">
    <div class="flex items-center justify-around h-16">
      <a href="index.html" class="flex flex-col items-center gap-1 px-3 py-2 text-slate-500 dark:text-slate-400">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        <span class="text-xs">Home</span>
      </a>
      <a href="exercises.html" class="flex flex-col items-center gap-1 px-3 py-2 text-slate-500 dark:text-slate-400">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>
        <span class="text-xs">Exercises</span>
      </a>
      <a href="routines.html" class="flex flex-col items-center gap-1 px-3 py-2 text-slate-500 dark:text-slate-400">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        <span class="text-xs">Build</span>
      </a>
      <a href="calendar.html" class="flex flex-col items-center gap-1 px-3 py-2 text-primary-600 dark:text-primary-400">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
        <span class="text-xs">Calendar</span>
      </a>
      <a href="records.html" class="flex flex-col items-center gap-1 px-3 py-2 text-slate-500 dark:text-slate-400">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
        <span class="text-xs">Profile</span>
      </a>
    </div>
  </nav>

  <script>
    let currentDate = new Date();
    let calendarData = {};

    async function loadCalendarData() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth() + 1;
      const monthKey = `${year}-${String(month).padStart(2, '0')}`;
      
      try {
        const res = await Auth.fetch(`/api/workouts?limit=100`);
        if (!res.ok) throw new Error('Failed to load workouts');
        const data = await res.json();
        
        calendarData = {};
        data.data.forEach(workout => {
          if (workout.started_at) {
            const dateKey = workout.started_at.split(' ')[0];
            if (!calendarData[dateKey]) {
              calendarData[dateKey] = [];
            }
            calendarData[dateKey].push(workout);
          }
        });

        updateStats(data.data);
        renderCalendar();
      } catch (err) {
        console.error('Error loading calendar:', err);
        App.toast.error('Failed to load calendar data');
      }
    }

    function updateStats(workouts) {
      if (!workouts || workouts.length === 0) {
        document.getElementById('streakValue').textContent = '0';
        document.getElementById('monthlyCount').textContent = '0';
        document.getElementById('totalWorkouts').textContent = '0';
        return;
      }

      const total = workouts.length;
      document.getElementById('totalWorkouts').textContent = total;

      const now = new Date();
      const currentMonth = now.getMonth();
      const currentYear = now.getFullYear();
      const monthlyWorkouts = workouts.filter(w => {
        const d = new Date(w.started_at);
        return d.getMonth() === currentMonth && d.getFullYear() === currentYear;
      });
      document.getElementById('monthlyCount').textContent = monthlyWorkouts.length;

      const streak = calculateStreak(workouts);
      document.getElementById('streakValue').textContent = streak;
    }

    function calculateStreak(workouts) {
      if (!workouts || workouts.length === 0) return 0;

      const workoutDates = workouts
        .map(w => w.started_at.split(' ')[0])
        .filter(d => d)
        .sort((a, b) => new Date(b) - new Date(a));

      const today = new Date().toISOString().split('T')[0];
      const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];

      if (workoutDates[0] !== today && workoutDates[0] !== yesterday) return 0;

      let streak = 1;
      let currentDate = new Date(workoutDates[0]);
      
      for (let i = 1; i < workoutDates.length; i++) {
        const prevDate = new Date(currentDate);
        prevDate.setDate(prevDate.getDate() - 1);
        const prevDateStr = prevDate.toISOString().split('T')[0];

        if (workoutDates[i] === prevDateStr) {
          streak++;
          currentDate = prevDate;
        } else {
          break;
        }
      }

      return streak;
    }

    function renderCalendar() {
      document.getElementById('loadingState').classList.add('hidden');
      document.getElementById('calendarContainer').classList.remove('hidden');

      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();

      const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 
                          'July', 'August', 'September', 'October', 'November', 'December'];
      document.getElementById('currentMonth').textContent = `${monthNames[month]} ${year}`;

      const firstDay = new Date(year, month, 1);
      const lastDay = new Date(year, month + 1, 0);
      const startingDay = firstDay.getDay();
      const totalDays = lastDay.getDate();

      const grid = document.getElementById('calendarGrid');
      grid.innerHTML = '';

      const today = new Date();
      const isCurrentMonth = today.getFullYear() === year && today.getMonth() === month;
      const todayDate = today.getDate();

      for (let i = 0; i < startingDay; i++) {
        const emptyCell = document.createElement('div');
        emptyCell.className = 'p-2 sm:p-4';
        grid.appendChild(emptyCell);
      }

      for (let day = 1; day <= totalDays; day++) {
        const dateKey = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        const dayWorkouts = calendarData[dateKey] || [];
        const isToday = isCurrentMonth && day === todayDate;

        const cell = document.createElement('button');
        cell.type = 'button';
        cell.className = `p-2 sm:p-4 min-h-[60px] sm:min-h-[80px] border-t border-r border-slate-200 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800 transition-all focus:ring-2 focus:ring-primary-500 focus:outline-none relative ${isToday ? 'bg-primary-50 dark:bg-primary-950/30' : ''}`;

        let intensityClass = '';
        if (dayWorkouts.length > 0) {
          const totalSets = dayWorkouts.reduce((sum, w) => sum + (w.set_count || 0), 0);
          if (totalSets <= 2) {
            intensityClass = 'bg-primary-200 dark:bg-primary-800';
          } else if (totalSets <= 5) {
            intensityClass = 'bg-primary-400 dark:bg-primary-600';
          } else {
            intensityClass = 'bg-primary-600 dark:bg-primary-400';
          }
        }

        cell.innerHTML = `
          <span class="text-sm font-medium ${isToday ? 'text-primary-600 dark:text-primary-400' : 'text-slate-700 dark:text-slate-300'}">${day}</span>
          ${dayWorkouts.length > 0 ? `
            <div class="absolute bottom-1 left-1 right-1 flex gap-0.5 justify-center">
              ${dayWorkouts.slice(0, 3).map(() => `<div class="w-1.5 h-1.5 rounded-full ${intensityClass}"></div>`).join('')}
              ${dayWorkouts.length > 3 ? '<span class="text-xs text-slate-400">+</span>' : ''}
            </div>
          ` : ''}
        `;

        if (dayWorkouts.length > 0) {
          cell.addEventListener('click', () => showWorkoutDetails(dateKey, dayWorkouts));
        }

        grid.appendChild(cell);
      }
    }

    function showWorkoutDetails(dateKey, workouts) {
      const modal = document.getElementById('workoutModal');
      const modalDate = document.getElementById('modalDate');
      const modalContent = document.getElementById('modalContent');

      const date = new Date(dateKey + 'T12:00:00');
      modalDate.textContent = date.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });

      if (workouts.length === 0) {
        modalContent.innerHTML = '<p class="text-slate-500 dark:text-slate-400 text-center py-8">No workouts recorded</p>';
      } else {
        modalContent.innerHTML = workouts.map(workout => `
          <div class="mb-4 last:mb-0 p-4 bg-slate-50 dark:bg-slate-800 rounded-lg">
            <div class="flex items-center justify-between mb-2">
              <span class="text-sm text-slate-500 dark:text-slate-400">${App.utils.formatTime(workout.started_at)}</span>
              <span class="text-xs px-2 py-1 rounded-full ${workout.completed_at ? 'bg-green-100 dark:bg-green-900/30 text-green-700 dark:text-green-400' : 'bg-yellow-100 dark:bg-yellow-900/30 text-yellow-700 dark:text-yellow-400'}">
                ${workout.completed_at ? 'Completed' : 'Incomplete'}
              </span>
            </div>
            <div class="flex items-center gap-4 text-sm">
              <div class="flex items-center gap-1">
                <svg class="w-4 h-4 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                <span class="text-slate-600 dark:text-slate-400">${workout.set_count || 0} sets</span>
              </div>
              ${workout.total_volume ? `
                <div class="flex items-center gap-1">
                  <svg class="w-4 h-4 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg>
                  <span class="text-slate-600 dark:text-slate-400">${App.utils.formatNumber(workout.total_volume)} lbs</span>
                </div>
              ` : ''}
            </div>
          </div>
        `).join('');
      }

      modal.classList.remove('hidden');
    }

    function closeModal() {
      document.getElementById('workoutModal').classList.add('hidden');
    }

    document.getElementById('prevMonth').addEventListener('click', () => {
      currentDate.setMonth(currentDate.getMonth() - 1);
      loadCalendarData();
    });

    document.getElementById('nextMonth').addEventListener('click', () => {
      currentDate.setMonth(currentDate.getMonth() + 1);
      loadCalendarData();
    });

    document.getElementById('closeModal').addEventListener('click', closeModal);
    document.getElementById('modalBackdrop').addEventListener('click', closeModal);

    document.getElementById('logoutBtn')?.addEventListener('click', () => Auth.logout());

    Auth.checkAuth();
    loadCalendarData();
  </script>
</body>
</html>
